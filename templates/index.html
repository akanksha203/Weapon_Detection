<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload & Delete Person</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-4xl text-center">
        <h2 class="text-2xl font-bold text-gray-700 mb-6">Manage Known Persons</h2>

        <div class="grid grid-cols-2 gap-6">
            <!-- Upload Section -->
            <div class="bg-gray-50 p-6 rounded-lg shadow">
                <h3 class="text-xl font-bold text-gray-700 mb-4">Add a Person</h3>
                <p class="text-gray-500 mb-4">Add a new known person to the system.</p>

                <form action="/" method="POST" enctype="multipart/form-data" class="space-y-4" onsubmit="return showProgress()">
                    <input type="text" name="person_name" placeholder="Enter Person's Name"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring focus:ring-blue-300 outline-none" required>
                    
                    <input type="file" name="images" multiple required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring focus:ring-blue-300 outline-none">
                    
                    <input type="hidden" name="action" value="add" />

                    <button type="submit" 
                        class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition duration-200">
                        Upload & Update Embeddings
                    </button>

                    <!-- Progress Bar-->
                    <div id="progress" class="hidden mt-4">
                        <div class="w-full bg-gray-200 rounded-full">
                            <div id="progress-bar" class="h-2 bg-blue-500 rounded-full" style="width: 0%;"></div>
                        </div>
                        <p class="text-gray-500 text-sm mt-2">Processing...</p>
                    </div>
                </form>
            </div>

            <!-- Delete Section -->
            <div class="bg-gray-50 p-6 rounded-lg shadow">
                <h3 class="text-xl font-bold text-gray-700 mb-4">Delete a Person</h3>
                <p class="text-gray-500 mb-4">Remove a known person from the system.</p>

                <form action="/" method="POST" class="space-y-4">
                    <input type="text" name="person_name" placeholder="Enter Person's Name to Delete"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring focus:ring-red-300 outline-none" required>

                    <input type="hidden" name="action" value="delete" />

                    <button type="submit"
                        class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-2 rounded-lg transition duration-200">
                        Delete Person
                    </button>
                </form>
            </div>
        </div>

       
        {% if message %}
            <p class="text-green-600 font-semibold mt-6">{{ message }}</p>
        {% endif %}
    </div>

    <script>
        function showProgress() {
            document.getElementById("progress").classList.remove("hidden");
            let progressBar = document.getElementById("progress-bar");
            let width = 0;
            let interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                } else {
                    width += 10;
                    progressBar.style.width = width + "%";
                }
            }, 500);
            return true;
        }
    </script>

</body>
</html>
